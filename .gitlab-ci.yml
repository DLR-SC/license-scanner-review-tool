default:
  tags:
    - docker

.frontend:
  image: node:24.15.0@sha256:050bf2bbe33c1d6754e060bec89378a79ed831f04a7bb1a53fe45e997df7b3bb
  needs: []
  before_script:
    - corepack enable
    - cd frontend
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

frontend:export-schema:
  extends: .python
  script:
    - uv run python export_openapi.py
  artifacts:
    paths:
      - frontend/openapi.json
    expire_in: 1 hour

frontend:generate:
  extends: .frontend
  needs:
    - job: frontend:export-schema
      artifacts: true
  script:
    - apt-get update -qq && apt-get install -y -qq default-jre-headless
    - pnpm run generate
  artifacts:
    paths:
      - frontend/src/client/
    expire_in: 1 hour

frontend:build:
  extends: .frontend
  needs:
    - job: frontend:generate
      artifacts: true
  script:
    - pnpm build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

frontend:type-check:
  extends: .frontend
  needs:
    - job: frontend:generate
      artifacts: true
  script:
    - pnpm type-check

frontend:lint:
  extends: .frontend
  script:
    - pnpm lint

frontend:format-check:
  extends: .frontend
  script:
    - pnpm format:check

frontend:test-unit:
  extends: .frontend
  script:
    - pnpm test:unit

frontend:test-e2e:
  extends: .frontend
  image: mcr.microsoft.com/playwright:v1.50.0-noble@sha256:e46352b075b3c97e226ad9ed27d6999dbc6e7f021ba94b30d833136fcee349f1
  script:
    - pnpm test:e2e
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

.python:
  image: python:3.12.13-slim-trixie@sha256:401f6e1a67dad31a1bd78e9ad22d0ee0a3b52154e6bd30e90be696bb6a3d7461
  needs: []
  before_script:
    - pip install --no-cache-dir uv==0.11.14
    - cd server
  cache:
    key:
      files:
        - server/uv.lock
    paths:
      - ~/.cache/uv/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

server:test:
  extends: .python
  script:
    - uv run pytest

server:format-check:
  extends: .python
  script:
    - uv run black --check .

reuse-lint:
  image: python:3.12.13-slim-trixie@sha256:401f6e1a67dad31a1bd78e9ad22d0ee0a3b52154e6bd30e90be696bb6a3d7461
  before_script:
    - pip install --no-cache-dir reuse
  script:
    - reuse lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
