default:
  tags:
    - docker

.frontend:
  image: node:24
  needs: []
  before_script:
    - corepack enable
    - cd frontend
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

frontend:export-schema:
  extends: .python
  script:
    - uv run python export_openapi.py
  artifacts:
    paths:
      - frontend/openapi.json
    expire_in: 1 hour

frontend:generate:
  extends: .frontend
  needs:
    - job: frontend:export-schema
      artifacts: true
  script:
    - apt-get update -qq && apt-get install -y -qq default-jre-headless
    - pnpm run generate
  artifacts:
    paths:
      - frontend/src/client/
    expire_in: 1 hour

frontend:build:
  extends: .frontend
  needs:
    - job: frontend:generate
      artifacts: true
  script:
    - pnpm build

frontend:type-check:
  extends: .frontend
  needs:
    - job: frontend:generate
      artifacts: true
  script:
    - pnpm type-check

frontend:lint:
  extends: .frontend
  script:
    - pnpm lint

frontend:format-check:
  extends: .frontend
  script:
    - pnpm format:check

frontend:test-e2e:
  extends: .frontend
  image: mcr.microsoft.com/playwright:v1.50.0-noble
  script:
    - pnpm test:e2e
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

.python:
  image: python:3.12-slim
  needs: []
  before_script:
    - pip install --no-cache-dir uv
    - cd server
  cache:
    key:
      files:
        - server/uv.lock
    paths:
      - ~/.cache/uv/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

server:test:
  extends: .python
  script:
    - uv run pytest

server:format-check:
  extends: .python
  script:
    - uv run black --check .

reuse-lint:
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir reuse
  script:
    - reuse lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
