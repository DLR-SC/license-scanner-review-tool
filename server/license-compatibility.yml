# License compatibility matrix for concluding package licenses.
#
# Answers: "Can code found under `found` be distributed under `target`?"
#   true  - compatible
#   false - incompatible
#   (omitted) - unknown (triggers a warning in the UI)
#
# The matrix is NOT symmetric. Distributing X as Y may be allowed while Y as X is not.
# WITH exceptions are treated as atomic identifiers (e.g. "GPL-2.0-only WITH Classpath-exception-2.0").

